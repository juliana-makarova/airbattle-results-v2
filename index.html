        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {

            color: #ffffff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 2px solid #ff0066;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 58px;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .header .battle-number {
            font-size: 24px;
            color: #888;
            margin-bottom: 20px;
        }

        .battle-meta {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            max-width: 720px;
            margin: 0 auto;
            text-align: center;
        }

        .battle-meta-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            line-height: 1.3;
            color: #888;
            white-space: nowrap;
        }

        .battle-meta-emoji {
            font-size: 20px;
        }

        @media (max-width: 768px) {
            .battle-meta {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 10px;
            }
            .battle-meta-item {
                white-space: normal;
            }
        }

        /* TABS */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tabs--bottom {
            margin-top: 40px;
            margin-bottom: 0;
        }

        .tab {
            padding: 12px 30px;
            background: #1a1a1a;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* Градиентная обводка + "переливание" */
        .tab::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 8px;
            padding: 2px; /* толщина обводки */
            background: linear-gradient(
                120deg,
                #ff0066,
                #6600ff,
                #ff0066,
                #6600ff
            );
            background-size: 300% 300%;
            /* Перелив рамки запускаем только на hover (см. ниже) */
            animation: tabBorderFlow 3.2s linear infinite;
            animation-play-state: paused;
            /* вырезаем центр, чтобы осталось только "кольцо" */
            mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.85;
        }

        /* Пробегающий блик по кнопкам с обводкой (неактивные) */
        .tab::after {
            content: "";
            position: absolute;
            inset: -40% -60%;
            background: linear-gradient(
                120deg,
                transparent 40%,
                rgba(255, 255, 255, 0.22) 50%,
                transparent 60%
            );
            transform: translateX(-60%) rotate(0deg);
            opacity: 0;
            pointer-events: none;
        }

        .tab:not(.active)::after {
            opacity: 0.7;
            animation: tabShineSweep 2.8s ease-in-out infinite;
        }

        .tab:hover::before {
            opacity: 1;
            animation-play-state: running;
            animation-duration: 2.4s;
        }

        .tab.active {
            background: linear-gradient(135deg, #ff0066, #6600ff);
            border-color: transparent;
        }

        .tab.active::before {
            opacity: 0; /* активный таб и так с заливкой */
            animation: none;
        }

        .tab.active::after {
            opacity: 0;
            animation: none;
        }

        @keyframes tabBorderFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes tabShineSweep {
            0% { transform: translateX(-60%) rotate(0deg); }
            60% { transform: translateX(60%) rotate(0deg); }
            100% { transform: translateX(60%) rotate(0deg); }
        }

        /* TASK BRIEF */
        .task-brief {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .task-list {

            padding-left: 18px;
            color: #ccc;
            line-height: 1.8;
            font-size: 16px;
        }

        .task-brief a {

            text-decoration: none;
        }

        }

        .participant-card:hover {

            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;

        }

        .participant-name {

            font-weight: bold;
        }

        .participant-handle {

            color: #6600ff;
            font-size: 14px;

        }

        .participant-handle:hover {

        }

        .participant-scores {

        /* MEDIA GRID */
        .media-grid {

            flex-direction: column;
        }

        .media-label {

            text-transform: uppercase;

        .media-content {

            border-radius: 4px;

            justify-content: center;
            color: #555;

const VISITOR_ID_KEY = 'ai_battles_visitor_id_v1';
function getVisitorId() {

        const existing = localStorage.getItem(VISITOR_ID_KEY);
        if (existing) return existing;

        const id = (window.crypto && typeof window.crypto.randomUUID === 'function')
            ? window.crypto.randomUUID()

let currentBattle = 1;
// Без регистрации и сервера ограничение "1 раз" работает только в рамках одного браузера (localStorage).
// Формат: { [voteKey]: { creativity: 1..10, applicability: 1..10, timestamp } }
const WORK_VOTES_KEY = 'ai_battles_work_votes_v1';
const workVotes = loadWorkVotes();

function loadWorkVotes() {
    try {
        const raw = localStorage.getItem(WORK_VOTES_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        return (parsed && typeof parsed === 'object') ? parsed : {};
    } catch (e) {
        console.warn('Failed to load work votes from localStorage:', e);
        return {};
    }
}

function saveWorkVotes() {
    localStorage.setItem(WORK_VOTES_KEY, JSON.stringify(workVotes));
}

function makeWorkVoteKey(battleId, participantId, workUrl) {
    // Голос должен привязываться к самой работе, а не к query-параметрам cache-busting (?v=...)
    const stableUrl = String(workUrl || '').split('?')[0];
    return `${battleId}::${participantId}::${stableUrl}`;
}

function getWorkVote(battleId, participantId, workUrl) {
    const key = makeWorkVoteKey(battleId, participantId, workUrl);
    const v = workVotes[key];
    if (!v || typeof v !== 'object') return null;
    const creativity = typeof v.creativity === 'number' ? v.creativity : null;
    const applicability = typeof v.applicability === 'number' ? v.applicability : null;
    if (!creativity || !applicability) return null;
    return { creativity, applicability };
}

function hasWorkVoted(battleId, participantId, workUrl) {
    return getWorkVote(battleId, participantId, workUrl) !== null;
}

function submitWorkVote(battleId, participantId, workUrl, voteData) {
    if (hasWorkVoted(battleId, participantId, workUrl)) return false;
    const key = makeWorkVoteKey(battleId, participantId, workUrl);
    workVotes[key] = {
        creativity: voteData.creativity,
        applicability: voteData.applicability,
        timestamp: Date.now()
    };
    saveWorkVotes();
    // Отправляем в общий backend (не блокируем UI)
    submitWorkVoteToBackend(battleId, participantId, workUrl, voteData);
    return true;
}

async function submitWorkVoteToBackend(battleId, participantId, workUrl, voteData) {
    if (!isBackendEnabled()) return;
    try {
        const visitorId = getVisitorId();
        const stableUrl = String(workUrl || '').split('?')[0];

        const { error } = await supabaseClient
            .from('votes')
            .insert([{
                battle_id: battleId,
                participant_id: participantId,
                work_url: stableUrl,
                visitor_id: visitorId,
                creativity: voteData.creativity,
                applicability: voteData.applicability
            }], { returning: 'minimal' });

        // Если уже есть уникальная запись (тот же visitor_id+work) — игнорируем
        if (error && error.code !== '23505') {
            console.warn('Vote submit failed:', error);
        }
    } catch (e) {
        console.warn('Vote submit exception:', e);
    }
}

function setupVideoPosters(root) {
    const videos = root.querySelectorAll('video[data-autoposter="1"]');

    const getCache = (key) => {
        try { return sessionStorage.getItem(key); } catch { return null; }
    };
    const setCache = (key, val) => {
        // dataURL может быть огромным — кешируем только в sessionStorage и только если влезает
        try {
            if (typeof val === 'string' && val.length < 350_000) sessionStorage.setItem(key, val);
        } catch {}
    };

    const getVideoLabel = (video) => {
        const item = video.closest('.media-item');
        const labelEl = item ? item.querySelector('.media-label') : null;
        return (labelEl && labelEl.textContent) ? labelEl.textContent.trim() : 'Презентация';
    };

    const makePlaceholderPoster = (labelText) => {
        const safe = String(labelText || 'Презентация')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        const svg =
            `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">` +
            `<defs>` +
            `<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">` +
            `<stop offset="0" stop-color="#14131f"/><stop offset="1" stop-color="#0c0b12"/>` +
            `</linearGradient>` +
            `</defs>` +
            `<rect width="1200" height="675" fill="url(#bg)"/>` +
            `<circle cx="600" cy="310" r="96" fill="rgba(140,82,255,0.18)" stroke="rgba(140,82,255,0.45)" stroke-width="4"/>` +
            `<path d="M575 270 L575 350 L650 310 Z" fill="rgba(255,255,255,0.9)"/>` +
            `<text x="600" y="520" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="44" fill="rgba(255,255,255,0.92)">` +
            `${safe}` +
            `</text>` +
            `</svg>`;

        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    };

    const waitOnce = (el, event, timeoutMs = 3500) => new Promise((resolve, reject) => {
        let t = null;
        const onOk = () => { cleanup(); resolve(); };
        const onErr = () => { cleanup(); reject(new Error(`video event error: ${event}`)); };
        const cleanup = () => {
            if (t) clearTimeout(t);
            el.removeEventListener(event, onOk);
            el.removeEventListener('error', onErr);
        };
        el.addEventListener(event, onOk, { once: true });
        el.addEventListener('error', onErr, { once: true });
        if (timeoutMs) t = setTimeout(() => { cleanup(); reject(new Error(`timeout waiting ${event}`)); }, timeoutMs);
    });

    const generatePosterFromFirstFrame = async (video, src, cacheKey) => {
        // Важно: для внешних хостингов нужен корректный CORS, иначе canvas будет "tainted" и toDataURL упадёт.
        // Мы в renderMedia уже ставим crossorigin="anonymous".
        const prevPreload = video.getAttribute('preload');
        try {
            video.setAttribute('preload', 'auto');
            // Обновим загрузку, чтобы браузер реально подтянул данные для кадра
            try { video.load(); } catch {}

            if (!video.videoWidth || !video.videoHeight) {
                await waitOnce(video, 'loadedmetadata', 4000);
            }

            // Seek чуть дальше 0, чтобы избежать "чёрного" кадра у некоторых кодеков
            const t = (video.duration && isFinite(video.duration)) ? Math.min(0.1, Math.max(0, video.duration - 0.1)) : 0.1;
            try {
                video.currentTime = t;
                await waitOnce(video, 'seeked', 4000);
            } catch {}

            // Дождаться возможности отрисовать кадр
            if (video.readyState < 2) {
                await waitOnce(video, 'loadeddata', 4000);
            }

            const w = video.videoWidth;
            const h = video.videoHeight;
            if (!w || !h) return;

            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            if (!ctx) return;

            ctx.drawImage(video, 0, 0, w, h);

            const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
            video.setAttribute('poster', dataUrl);
            setCache(cacheKey, dataUrl);
        } catch {
            // Если не вышло — оставим placeholder (так не будет чёрного окна)
        } finally {
            if (prevPreload) video.setAttribute('preload', prevPreload);
        }
    };

    // Генерируем постеры лениво: когда видео попадает в область видимости
    const io = ('IntersectionObserver' in window)
        ? new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                const video = entry.target;
                io.unobserve(video);
                const srcEl = video.querySelector('source');
                const src = srcEl ? srcEl.getAttribute('src') : null;
                if (!src) return;
                const cacheKey = `ai_battles_poster::${src}`;
                generatePosterFromFirstFrame(video, src, cacheKey);
            });
        }, { root: null, rootMargin: '250px', threshold: 0.01 })
        : null;

    videos.forEach(video => {
        const srcEl = video.querySelector('source');
        const src = srcEl ? srcEl.getAttribute('src') : null;
        if (!src) return;

        const cacheKey = `ai_battles_poster::${src}`;
        const cached = getCache(cacheKey);

        // Сразу ставим placeholder, чтобы не было чёрного окна вообще
        if (!video.getAttribute('poster')) {
            const label = getVideoLabel(video);
            video.setAttribute('poster', cached || makePlaceholderPoster(label));
        }

        if (cached) return;

        if (io) {
            io.observe(video);
            return;
        }

        // Фоллбек без IntersectionObserver: пытаемся сразу, но не блокируем рендер
        setTimeout(() => generatePosterFromFirstFrame(video, src, cacheKey), 0);
    });
}

// Подстройка aspect-ratio под реальные размеры картинки/видео (по умолчанию 1:1, см. CSS)
function setupMediaAspect(card) {
    // На десктопе сетка должна быть стабильной (3 контейнера одной высоты) — не меняем aspect-ratio.
    if (!window.matchMedia('(max-width: 768px)').matches) return;

    const mediaContents = card.querySelectorAll('.media-content');

    function setAspect(el, w, h) {
        if (!w || !h) return;
        el.style.aspectRatio = `${w} / ${h}`;
    }

    mediaContents.forEach(content => {
        const img = content.querySelector('img');
        if (img) {
            if (img.complete && img.naturalWidth && img.naturalHeight) {
                setAspect(content, img.naturalWidth, img.naturalHeight);
            } else {
                img.addEventListener('load', () => setAspect(content, img.naturalWidth, img.naturalHeight), { once: true });
            }
            return;
        }

        const video = content.querySelector('video');
        if (video) {
            if (video.videoWidth && video.videoHeight) {
                setAspect(content, video.videoWidth, video.videoHeight);
            } else {
                video.addEventListener('loadedmetadata', () => setAspect(content, video.videoWidth, video.videoHeight), { once: true });
            }
            return;
        }

        const iframe = content.querySelector('iframe');
        if (iframe) {
            // Для embed-ов обычно 16:9
            content.style.aspectRatio = '16 / 9';
        }
    });
}

// Рендер медиа
function renderMedia(media) {
    const safeUrl = escapeHtml(String(media?.url || ''));
    const safeFullUrl = escapeHtml(String(media?.fullUrl || ''));
    if (media.type === 'image') {
        // Если fullUrl не задан — открываем то же изображение
        const full = safeFullUrl || safeUrl;
        return `<img src="${safeUrl}" data-lightbox="1" data-full-url="${full}" alt="Media" loading="lazy" decoding="async" />`;
    } else if (media.type === 'video') {
        // Можно использовать YouTube embed или video tag
        if (safeUrl.includes('youtube.com') || safeUrl.includes('youtu.be')) {
            const videoId = extractYouTubeId(safeUrl);
            return `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen loading="lazy"></iframe>`;
        }
        // Boomstream player page (может работать как embed, если хостинг разрешает iframe)
        if (safeUrl.includes('play.boomstream.com/')) {
            return `<iframe src="${safeUrl}" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
        }
        // Локальные/прямые mp4/webm/ogg/mov
        if (/\.(mp4|webm|ogg|mov)(\?.*)?$/i.test(safeUrl)) {
            const typeAttr = safeUrl.toLowerCase().includes('.mov') ? 'video/quicktime' : 'video/mp4';
            const posterUrl = (typeof media.posterUrl === 'string' && media.posterUrl.trim()) ? media.posterUrl.trim() : '';
            const posterAttr = posterUrl ? ` poster="${escapeHtml(posterUrl)}"` : '';
            return `
                <video controls playsinline preload="metadata" data-autoposter="1" crossorigin="anonymous"${posterAttr}>
                    <source src="${safeUrl}" type="${typeAttr}" />
                    Ваш браузер не поддерживает видео.
                </video>
            `;
        }
        // Универсальный фоллбек: встраиваем страницу видеохостинга (embed URL)
        return `<iframe src="${safeUrl}" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
    }
    return 'Медиа загружается...';
}

// Генерация звёзд
function generateStars(max = 10) {
    let html = '';
    for (let i = 1; i <= max; i++) {
        html += `<span class="star" data-value="${i}">★</span>`;
    }
    return html;
}

function inferMediaTypeFromUrl(url) {
    if (!url) return 'image';
    if (String(url).includes('play.boomstream.com/')) return 'video';
    if (/\.(mp4|webm|ogg|mov)(\?.*)?$/i.test(url)) return 'video';
    return 'image';
}

function renderWorkItem(work, battleId, participantId, idx) {
    const url = work?.url || '';
    const type = work?.type || inferMediaTypeFromUrl(url);
    const label = (typeof work?.label === 'string' && work.label.trim()) ? work.label.trim() : '';
    const posterUrl = (typeof work?.posterUrl === 'string' && work.posterUrl.trim()) ? work.posterUrl.trim() : '';
    const fullUrl = (typeof work?.fullUrl === 'string' && work.fullUrl.trim()) ? work.fullUrl.trim() : '';

    const safeUrl = escapeHtml(url);
    const safePid = escapeHtml(participantId);
    const safeLabel = label ? escapeHtml(label) : '';

    const mediaHtml = url
        ? renderMedia({ type, url, fullUrl, posterUrl })
        : 'Медиа скоро появится...';

    return `
        <div class="media-item" data-battle="${battleId}" data-participant="${safePid}" data-work-url="${safeUrl}">
            ${safeLabel ? `<div class="media-label">${safeLabel}</div>` : ''}
            <div class="media-content">${mediaHtml}</div>

            <div class="voting-section voting-section--work">
                <div class="voting-title">Оцените эту работу</div>
                <div class="voting-criteria">
                    <div class="criteria-item">
                        <div class="criteria-label">
                            <span>Креативность (1–10)</span>
                            <span class="selected-value" data-criteria="creativity">—</span>
                        </div>
                        <div class="stars" data-criteria="creativity">
                            ${generateStars(10)}
                        </div>
                    </div>
                    <div class="criteria-item">
                        <div class="criteria-label">
                            <span>Применимость (1–10)</span>
                            <span class="selected-value" data-criteria="applicability">—</span>
                        </div>
                        <div class="stars" data-criteria="applicability">
                            ${generateStars(10)}
                        </div>
                    </div>
                </div>
                <button class="submit-vote" disabled>Отправить оценку</button>
                <div class="vote-success" style="display:none;">✓ Спасибо! Ваша оценка учтена.</div>

                </div>
            </div>
        </div>
    `;
}

// Голосование на каждое медиа-окно (1 раз на окно в рамках браузера)
function setupWorkVoting(mediaItemEl) {
    const battleId = parseInt(mediaItemEl.dataset.battle, 10);
    const participantId = mediaItemEl.dataset.participant;
    const workUrl = mediaItemEl.dataset.workUrl;

    const starsContainers = mediaItemEl.querySelectorAll('.stars[data-criteria]');
    const submitBtn = mediaItemEl.querySelector('.submit-vote');
    const successMsg = mediaItemEl.querySelector('.vote-success');
    const alreadyMsg = mediaItemEl.querySelector('.vote-already');

    if (!battleId || !participantId || !workUrl) {
        if (submitBtn) submitBtn.disabled = true;
        return;
    }

    let selectedVotes = { creativity: 0, applicability: 0 };

    function setStarsUI(stars, value) {
        stars.forEach((s, index) => {
            if (index < value) s.classList.add('active');
            else s.classList.remove('active');
        });
    }

    function disableStars(stars) {
        stars.forEach(s => {
            s.style.pointerEvents = 'none';
            s.style.opacity = '0.7';
        });
    }

    // Если уже голосовали за это окно — показываем и блокируем
    const existing = getWorkVote(battleId, participantId, workUrl);
    if (existing) {
        starsContainers.forEach(container => {
            const criteria = container.dataset.criteria;
            const stars = container.querySelectorAll('.star');
            const value = criteria === 'creativity' ? existing.creativity : existing.applicability;
            setStarsUI(stars, value);
            const span = mediaItemEl.querySelector(`.selected-value[data-criteria="${criteria}"]`);
            if (span) span.textContent = value;
            disableStars(stars);
        });
        if (submitBtn) submitBtn.style.display = 'none';
        if (alreadyMsg) alreadyMsg.style.display = 'block';
        return;
    }

    // Выбор звёзд
    starsContainers.forEach(container => {
        const criteria = container.dataset.criteria;
        const stars = container.querySelectorAll('.star');
        const span = mediaItemEl.querySelector(`.selected-value[data-criteria="${criteria}"]`);

        stars.forEach(star => {
            star.addEventListener('click', () => {
                const value = parseInt(star.dataset.value, 10);
                if (!value || value < 1 || value > 10) return;
                selectedVotes[criteria] = value;
                setStarsUI(stars, value);
                if (span) span.textContent = value;
                if (selectedVotes.creativity > 0 && selectedVotes.applicability > 0) {
                    submitBtn.disabled = false;
                }
            });
        });
    });

    submitBtn.addEventListener('click', () => {
        if (selectedVotes.creativity > 0 && selectedVotes.applicability > 0) {
            const ok = submitWorkVote(battleId, participantId, workUrl, selectedVotes);
            if (!ok) {
                if (alreadyMsg) alreadyMsg.style.display = 'block';
                starsContainers.forEach(c => disableStars(c.querySelectorAll('.star')));
                submitBtn.style.display = 'none';
                return;
            }
            submitBtn.style.display = 'none';
            successMsg.style.display = 'block';
            starsContainers.forEach(c => disableStars(c.querySelectorAll('.star')));
        }
    });
}

function setupLightbox() {
    const lb = document.getElementById('lightbox');
    const img = document.getElementById('lightbox-img');
    const caption = document.getElementById('lightbox-caption');
    const closeBtn = document.getElementById('lightbox-close');
    if (!lb || !img || !caption || !closeBtn) return;

    let prevBodyOverflow = '';

    const open = (fullUrl, capText) => {
        const u = String(fullUrl || '').trim();
        if (!u) return;
        caption.textContent = capText || '';
        img.removeAttribute('src');
        img.setAttribute('src', u);
        lb.classList.add('open');
        lb.setAttribute('aria-hidden', 'false');
        prevBodyOverflow = document.body.style.overflow || '';
        document.body.style.overflow = 'hidden';
    };

    const close = () => {
        lb.classList.remove('open');
        lb.setAttribute('aria-hidden', 'true');
        img.removeAttribute('src');
        caption.textContent = '';
        document.body.style.overflow = prevBodyOverflow;
    };

    // Делегирование клика по превью
    document.addEventListener('click', (e) => {
        const target = e.target;
        if (!(target instanceof Element)) return;
        const thumb = target.closest('img[data-lightbox="1"]');
        if (!thumb) return;
        e.preventDefault();

        const fullUrl = thumb.getAttribute('data-full-url') || thumb.getAttribute('src') || '';
        const item = thumb.closest('.media-item');
        const labelEl = item ? item.querySelector('.media-label') : null;
        const cap = labelEl && labelEl.textContent ? labelEl.textContent.trim() : '';
        open(fullUrl, cap);
    });

    // Закрытие: кнопка / фон / Esc
    closeBtn.addEventListener('click', close);
    lb.addEventListener('click', (e) => {
        if (e.target === lb) close();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && lb.classList.contains('open')) close();
    });
}

// Извлечение YouTube ID
function extractYouTubeId(url) {
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
    const match = url.match(regExp);
    return (match && match[2].length === 11) ? match[2] : null;
}

// СИСТЕМА КОММЕНТАРИЕВ
// ========================================

// Важно: без регистрации и сервера комментарии сохраняются ТОЛЬКО в браузере пользователя (localStorage).
// Формат: { ["battleId::participantId"]: { name, text, timestamp } } — один комментарий на участника в рамках таба.
const COMMENTS_KEY = 'ai_battles_comments_v3';
const LEGACY_COMMENTS_KEY_V2 = 'ai_battles_comments_v2';
const LEGACY_COMMENTS_KEY = 'ai_battles_comments';
const comments = loadComments();

function loadComments() {
    try {
        const raw = localStorage.getItem(COMMENTS_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        if (parsed && typeof parsed === 'object') return parsed;

        // Миграция с v2 (там было { participantId: {name,text,timestamp} })
        const legacyV2Raw = localStorage.getItem(LEGACY_COMMENTS_KEY_V2);
        const legacyV2Parsed = legacyV2Raw ? JSON.parse(legacyV2Raw) : null;
        if (legacyV2Parsed && typeof legacyV2Parsed === 'object') {
            const migrated = {};
            for (const [pid, c] of Object.entries(legacyV2Parsed)) {
                if (c && typeof c.name === 'string' && typeof c.text === 'string') {
                    migrated[`1::${pid}`] = { name: c.name, text: c.text, timestamp: c.timestamp || Date.now() };
                }
            }
            localStorage.setItem(COMMENTS_KEY, JSON.stringify(migrated));
            return migrated;
        }

        // Миграция со старого ключа (там был массив комментариев на участника)
        const legacyRaw = localStorage.getItem(LEGACY_COMMENTS_KEY);
        const legacyParsed = legacyRaw ? JSON.parse(legacyRaw) : null;
        if (legacyParsed && typeof legacyParsed === 'object') {
            const migrated = {};
            for (const [pid, arr] of Object.entries(legacyParsed)) {
                if (Array.isArray(arr) && arr.length > 0) {
                    const last = arr.slice().sort((a, b) => (b?.timestamp || 0) - (a?.timestamp || 0))[0];
                    if (last && typeof last.name === 'string' && typeof last.text === 'string') {
                        migrated[`1::${pid}`] = { name: last.name, text: last.text, timestamp: last.timestamp || Date.now() };
                    }
                }
            }
            localStorage.setItem(COMMENTS_KEY, JSON.stringify(migrated));
            return migrated;
        }

        return {};
    } catch (e) {
        console.warn('Failed to load comments from localStorage:', e);
        return {};
    }
}

function saveComments() {
    localStorage.setItem(COMMENTS_KEY, JSON.stringify(comments));
}

function makeCommentKey(battleId, participantId) {
    return `${battleId}::${participantId}`;
}

function getUserComment(battleId, participantId) {
    const c = comments[makeCommentKey(battleId, participantId)];
    if (!c || typeof c !== 'object') return null;
    if (typeof c.name !== 'string' || typeof c.text !== 'string') return null;
    return { name: c.name, text: c.text, timestamp: c.timestamp || Date.now() };
}

function hasUserComment(battleId, participantId) {
    return getUserComment(battleId, participantId) !== null;
}

// Получить количество комментариев
function getCommentsCount(battleId, participantId) {
    return hasUserComment(battleId, participantId) ? 1 : 0;
}

// Рендер комментариев
function renderComments(battleId, participantId) {
    const c = getUserComment(battleId, participantId);
    if (!c) {
        return '<div class="no-comments">Пока нет комментариев. Будьте первым!</div>';
    }

    return `
        <div class="comment-item">
            <div class="comment-header">
                <div class="comment-author">${escapeHtml(c.name)}</div>
                <div class="comment-date">${formatDate(c.timestamp)}</div>
            </div>
            <div class="comment-text">${escapeHtml(c.text)}</div>
        </div>
    `;
}

function renderBackendCommentsList(items) {
    if (!Array.isArray(items) || items.length === 0) {
        return '<div class="no-comments">Пока нет комментариев. Будьте первым!</div>';
    }

    return items.map(c => {
        const name = escapeHtml(String(c?.name || ''));
        const text = escapeHtml(String(c?.text || ''));
        const ts = c?.created_at ? new Date(c.created_at).getTime() : Date.now();

        return `
            <div class="comment-item">
                <div class="comment-header">
                    <div class="comment-author">${name}</div>
                    <div class="comment-date">${formatDate(ts)}</div>
                </div>
                <div class="comment-text">${text}</div>
            </div>
        `;
    }).join('');
}

async function hydrateCommentsFromBackend(card, battleId, participantId) {
    if (!isBackendEnabled()) return;
    try {
        const { data, error } = await supabaseClient
            .from('comments')
            .select('name,text,created_at')
            .eq('battle_id', battleId)
            .eq('participant_id', participantId)
            .order('created_at', { ascending: false })
            .limit(50);

        if (error) {
            // Если таблицы/политики ещё не созданы — просто оставим локальный режим
            console.warn('Comments load failed:', error);
            return;
        }

        const commentsList = card.querySelector(`#comments-${battleId}-${participantId}`);
        if (commentsList) commentsList.innerHTML = renderBackendCommentsList(data || []);

        const commentsTitle = card.querySelector('.comments-title');
        if (commentsTitle) commentsTitle.textContent = `Комментарии (${(data || []).length})`;
    } catch (e) {
        console.warn('Comments load exception:', e);
    }
}

async function submitCommentToBackend(battleId, participantId, name, text) {
    if (!isBackendEnabled()) return;
    try {
        const visitorId = getVisitorId();
        const { error } = await supabaseClient
            .from('comments')
            .insert([{
                battle_id: battleId,
                participant_id: participantId,
                visitor_id: visitorId,
                name: name.trim(),
                text: text.trim()
            }], { returning: 'minimal' });

        // Уже есть комментарий от этого visitor_id — игнорируем
        if (error && error.code !== '23505') {
            console.warn('Comment submit failed:', error);
        }
    } catch (e) {
        console.warn('Comment submit exception:', e);
    }
}

// Добавить комментарий
function addComment(battleId, participantId, name, text) {
    if (hasUserComment(battleId, participantId)) return false;

    comments[makeCommentKey(battleId, participantId)] = {
        name: name.trim(),
        text: text.trim(),
        timestamp: Date.now()
    };

    saveComments();
    console.log('Comment added:', participantId, name);
    return true;
}

// Обновить список комментариев на странице
function updateCommentsList(card, battleId, participantId) {
    const commentsList = card.querySelector(`#comments-${battleId}-${participantId}`);
    if (commentsList) commentsList.innerHTML = renderComments(battleId, participantId);

    const commentsTitle = card.querySelector('.comments-title');
    if (commentsTitle) commentsTitle.textContent = `Комментарии (${getCommentsCount(battleId, participantId)})`;
}

// Экранирование HTML
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Форматирование даты
function formatDate(timestamp) {
    const date = new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    
    // Меньше минуты
    if (diff < 60000) {
        return 'только что';
    }
    
    // Меньше часа
    if (diff < 3600000) {
        const minutes = Math.floor(diff / 60000);
        return `${minutes} мин назад`;
    }
    
    // Меньше дня
    if (diff < 86400000) {
        const hours = Math.floor(diff / 3600000);
        return `${hours} ч назад`;
    }
    
    // Полная дата
    const day = date.getDate().toString().padStart(2, '0');
    const month = (date.getMonth() + 1).toString().padStart(2, '0');
    const year = date.getFullYear();
    const hours = date.getHours().toString().padStart(2, '0');
    const minutes = date.getMinutes().toString().padStart(2, '0');
    
    return `${day}.${month}.${year} ${hours}:${minutes}`;
}

// Настройка формы комментариев
function setupCommentForm(card, battleId, participantId) {
    const submitBtn = card.querySelector('.submit-comment');
    const nameInput = card.querySelector('.comment-name');
    const textArea = card.querySelector('.comment-text');
    const alreadyMsg = card.querySelector('.comment-already');

    // Если уже комментировали — блокируем форму
    const existing = getUserComment(battleId, participantId);
    if (existing) {
        if (nameInput) nameInput.value = existing.name;
        if (textArea) textArea.value = existing.text;
        if (nameInput) nameInput.disabled = true;
        if (textArea) textArea.disabled = true;
        if (submitBtn) submitBtn.style.display = 'none';
        if (alreadyMsg) alreadyMsg.style.display = 'block';
        return;
    }
    
    submitBtn.addEventListener('click', () => {
        const name = nameInput.value.trim();
        const text = textArea.value.trim();
        
        // Валидация
        if (!name) {
            alert('Пожалуйста, укажите ваше имя');
            nameInput.focus();
            return;
        }
        
        if (!text) {
            alert('Пожалуйста, напишите комментарий');
            textArea.focus();
            return;
        }
        
        if (text.length < 3) {
            alert('Комментарий слишком короткий (минимум 3 символа)');
            textArea.focus();
            return;
        }
        
        // Добавляем комментарий
        const ok = addComment(battleId, participantId, name, text);
        if (!ok) {
            if (alreadyMsg) alreadyMsg.style.display = 'block';
            submitBtn.style.display = 'none';
            nameInput.disabled = true;
            textArea.disabled = true;
            return;
        }

        // Отправляем в общий backend (не блокируем UI) и обновляем список с сервера
        submitCommentToBackend(battleId, participantId, name, text)
            .finally(() => hydrateCommentsFromBackend(card, battleId, participantId));
        
        // Обновляем список
        updateCommentsList(card, battleId, participantId);
        
        // Блокируем форму навсегда для этого участника (1 раз)
        nameInput.disabled = true;
        textArea.disabled = true;
        submitBtn.style.display = 'none';
        if (alreadyMsg) alreadyMsg.style.display = 'block';
    });
}

// Старый ключ ai_battles_votes больше не используем (там была другая схема с 2 критериями и 10 звёздами).

</script>
